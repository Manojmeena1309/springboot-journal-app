spring:
  data:
    redis:
      host: REDIS_HOST
      port: REDIS_PORT
      username: REDIS_USERNAME
      password: REDIS_PASSWORD
      ssl:
        enabled: true

  mongodb:
    uri: MONGODB_URI
    database: journaldb
    auto-index-creation: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_GMAIL_ADDRESS
    password: YOUR_GMAIL_APP_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

weather:
  api:
    key: WEATHER_API_KEY

jwt:
  secret: YOUR_JWT_SECRET_KEY